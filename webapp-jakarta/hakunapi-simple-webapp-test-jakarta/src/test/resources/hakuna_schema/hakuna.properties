$config.version=2

api.title=Schema Test API
api.version=1.0
api.description=Test API for schema-based configuration

servers=dev
servers.dev.url=https://localhost/hakuna
servers.dev.description=Test

getfeatures.limit.default=100
getfeatures.limit.max=1000

db.classes=fi.nls.hakunapi.source.HakunaTestSource
db=db

schema=my_schema
schema.my_schema.path=test_schema.json

default.collections.srid=3067

collections=building_part_area,fence

collections.building_part_area.geometry.type=POINT
collections.building_part_area.properties=name,building_function_id
collections.building_part_area.properties.building_function_id.type=INT
collections.building_part_area.testdata.1=1;POINT(1 1);Building A;1
collections.building_part_area.testdata.2=2;POINT(2 2);Building B;3

collections.fence.geometry.type=POINT
collections.fence.properties=name
collections.fence.testdata.1=1;POINT(3 3);Fence A
collections.fence.testdata.2=2;POINT(4 4);Fence B
