# General information about the api
# Not required, dummy values provided by the service
api.title=INSPIRE Simple Addresses, Finland
api.version=0.1
api.description=Example implementation of OGC API Services with hakunapi. INSPIRE Simple Addresses from Finland. Address and Building Data / Source: Syke (Finnish Environment Institute)
#api.contact.name=Name of Contact
#api.contact.email=concat@email.com
#api.contact.url=https://github.com/nlsfi/hakunapi
api.license.name=Creative Commons Attribution 4.0 International (CC BY 4.0) - Syke (Finnish Environment Institute)
api.license.url=https://www.syke.fi/fi/ymparistotieto/kayttolupa-ja-vastuut

# List of servers 
## Required, comma-separated list of server the API is
servers=dev
## The url of the server has to be correct as it is used for all links generated by the server
servers.dev.url=http://localhost:8080/features
servers.dev.description=Development server

# API level configuration
formats=geojson,html,gpkg
formats.geojson.type=json
# force lon,lat axisOrder on GeoJSON output even if output CRS is lat,lon by authority
# formats.geojson.forceLonLat=true
formats.html.type=html
# HTML tile layer configuration per SRID
formats.html.3067.tileUrl=https://avoin-karttakuva.maanmittauslaitos.fi/avoin/wmts/1.0.0/taustakartta/default/ETRS-TM35FIN/{z}/{y}/{x}.png?api-key=7cd2ddae-9f2e-481c-99d0-404e7bc7a0b2
formats.html.3067.tileAttribution=&copy; <a href="https://www.nls.fi">National Land Survey of Finland</a>
formats.html.3067.tileOriginX=-548576
formats.html.3067.tileOriginY=8388608
formats.html.3903.tileUrl=https://avoin-karttakuva.maanmittauslaitos.fi/avoin/wmts/1.0.0/taustakartta/default/ETRS-TM35FIN/{z}/{y}/{x}.png?api-key=7cd2ddae-9f2e-481c-99d0-404e7bc7a0b2
formats.html.3903.tileAttribution=&copy; <a href="https://www.nls.fi">National Land Survey of Finland</a>
formats.html.3903.tileOriginX=-548576
formats.html.3903.tileOriginY=8388608
formats.html.10774.tileUrl=https://avoin-karttakuva.maanmittauslaitos.fi/avoin/wmts/1.0.0/taustakartta/default/ETRS-TM35FIN/{z}/{y}/{x}.png?api-key=7cd2ddae-9f2e-481c-99d0-404e7bc7a0b2
formats.html.10774.tileAttribution=&copy; <a href="https://www.nls.fi">National Land Survey of Finland</a>
formats.html.10774.tileOriginX=-548576
formats.html.10774.tileOriginY=8388608
formats.gpkg.type=gpkg
formats.gpkg.dir=/app/features_addresses/tmp
getfeatures.limit.default=10
getfeatures.limit.max=10000

# Configure known srids (hakunapi will always add 84 (lon, lat) and 4326 (lat, lon))
srid=3067,4258,3903,10774
# Let hakunapi know that EPSG:4258 is lat,lon order
srid.4258.latLon=true
# EPSG:3067 is east,north order (projected)
srid.3067.latLon=false
srid.3067.proj4=+proj=utm +zone=35 +ellps=GRS80 +towgs84=0,0,0,0,0,0,0 +units=m +no_defs
# EPSG:3903 (north,east axis order)
srid.3903.latLon=true
srid.3903.geometryDimension=XYZ
srid.3903.proj4=+proj=utm +zone=35 +ellps=GRS80 +units=m +vunits=m +no_defs +type=crs
# EPSG:10774 (east,north axis order)
srid.10774.latLon=false
srid.10774.geometryDimension=XYZ
srid.10774.proj4=+proj=utm +zone=35 +ellps=GRS80 +units=m +vunits=m +no_defs +type=crs

# JSON Schema for additional metadata (titles, descriptions, codelist URIs)
# schema names imply the language tag (overridable with schema.<name>.lang=)
schema=en,fi
schema.en.path=addresses_schema_en.json
schema.fi.path=addresses_schema_fi.json

# Collections and their configurations

## Required, comma-separated list of all collections
collections=addresses,addresses_view

## Title and description can be set here or via the schema file (see schema= above)
#collections.addresses.title=Simple Addresses
#collections.addresses.description=Addresses of Finlands Buildings

## Select a strategy for case-insensitive comparisons
## Valid values can be found from CaseInsensitiveStrategy enum (default value is `lower`)
## If we indexed an expression `upper(thoroughfare_name)` then it would make sense to configure this to `upper`
collections.addresses.casei=lower

## Should properties with null values be omitted from the response
collections.addresses.writeNulls=true

## PostgreSQL/PostGIS configuration 
### This collection is backed by 'pg' (PostgreSQL/PostGIS) source/driver 
collections.addresses.type=pg
### Name of {db}.properties
collections.addresses.db=db
collections.addresses.schema=public
collections.addresses.table=simple_addresses

### Spatial extent of the collection, required by some clients to recognize the colletion as a spatial feature collection
collections.addresses.extent.spatial.crs84=15.0537852,58.6074565,33.9935374,70.2641566

### Supported Coordinate Reference Systems (CRS:84 is always and automatically included)
collections.addresses.srid=3067,4258,3903,10774


### Required, mapping for primary id property
collections.addresses.id.mapping=id

### Mapping for primary geometry property
collections.addresses.geometry.mapping=geom

### List of all (other) properties 
collections.addresses.properties=inspireId_localId,inspireId_namespace,component_ThoroughfareName,component_PostalDescriptor,component_AdminUnitName_1,component_AdminUnitName_4,locator_designator_addressNumber,locator_level,locator_level_href,position_specification,position_specification_href,position_method,position_method_href,position_default,building,parcel

### property is mapped to a static value instead of column reference if mapping is single-quoted
collections.addresses.properties.inspireId_localId.mapping=id
collections.addresses.properties.inspireId_namespace.mapping='https://github.com/INSPIRE-MIF/2017.2/GeoJSON/ads/examples/'

collections.addresses.properties.component_ThoroughfareName.mapping=thoroughfare_name
collections.addresses.properties.component_PostalDescriptor.mapping=postal_descriptor
collections.addresses.properties.component_AdminUnitName_1.mapping='Suomi'
collections.addresses.properties.component_AdminUnitName_4.mapping=admin_unit_name_4

collections.addresses.properties.locator_designator_addressNumber.mapping=address_number
collections.addresses.properties.locator_level.mapping='siteLevel'
collections.addresses.properties.locator_level_href.mapping='https://inspire.ec.europa.eu/codelist/LocatorLevelValue/siteLevel'

collections.addresses.properties.position_specification.mapping='building'
collections.addresses.properties.position_specification_href.mapping='https://inspire.ec.europa.eu/codelist/GeometrySpecificationValue/building'
collections.addresses.properties.position_method.mapping='byOtherParty'
collections.addresses.properties.position_method_href.mapping='https://inspire.ec.europa.eu/codelist/GeometryMethodValue/byOtherParty'
collections.addresses.properties.position_default.mapping='true'

### If the name of the property matches the name of the backing column no mapping is required
### collections.addresses.properties.building.mapping=building
### collections.addresses.properties.parcel.mapping=parcel

## Queryables
collections.addresses.parameters=inspireId_localId,component_ThoroughfareName,component_PostalDescriptor,component_AdminUnitName_4,locator_designator_addressNumber,building,parcel

## View collection demonstrating DB-level views and latLon-ordered storage CRS
collections.addresses_view.title=Simple Addresses (EPSG:3903 view)
collections.addresses_view.description=Addresses of Finlands Buildings using a database view transformed to EPSG:3903. Demonstrates database-level view usage and storage in a latLon-ordered projected CRS (north,east axis order).

collections.addresses_view.casei=lower
collections.addresses_view.writeNulls=true

collections.addresses_view.type=pg
collections.addresses_view.db=db
collections.addresses_view.schema=public
collections.addresses_view.table=simple_addresses_3903

collections.addresses_view.extent.spatial.crs84=15.0537852,58.6074565,33.9935374,70.2641566

collections.addresses_view.srid=3903,10774,3067,4258

collections.addresses_view.id.mapping=id
collections.addresses_view.geometry.mapping=geom
collections.addresses_view.geometry.storageSrid=3903

collections.addresses_view.properties=inspireId_localId,inspireId_namespace,component_ThoroughfareName,component_PostalDescriptor,component_AdminUnitName_1,component_AdminUnitName_4,locator_designator_addressNumber,locator_level,locator_level_href,position_specification,position_specification_href,position_method,position_method_href,position_default,building,parcel

collections.addresses_view.properties.inspireId_localId.mapping=id
collections.addresses_view.properties.inspireId_namespace.mapping='https://github.com/INSPIRE-MIF/2017.2/GeoJSON/ads/examples/'

collections.addresses_view.properties.component_ThoroughfareName.mapping=thoroughfare_name
collections.addresses_view.properties.component_PostalDescriptor.mapping=postal_descriptor
collections.addresses_view.properties.component_AdminUnitName_1.mapping='Suomi'
collections.addresses_view.properties.component_AdminUnitName_4.mapping=admin_unit_name_4

collections.addresses_view.properties.locator_designator_addressNumber.mapping=address_number
collections.addresses_view.properties.locator_level.mapping='siteLevel'
collections.addresses_view.properties.locator_level_href.mapping='https://inspire.ec.europa.eu/codelist/LocatorLevelValue/siteLevel'

collections.addresses_view.properties.position_specification.mapping='building'
collections.addresses_view.properties.position_specification_href.mapping='https://inspire.ec.europa.eu/codelist/GeometrySpecificationValue/building'
collections.addresses_view.properties.position_method.mapping='byOtherParty'
collections.addresses_view.properties.position_method_href.mapping='https://inspire.ec.europa.eu/codelist/GeometryMethodValue/byOtherParty'
collections.addresses_view.properties.position_default.mapping='true'

collections.addresses_view.parameters=inspireId_localId,component_ThoroughfareName,component_PostalDescriptor,component_AdminUnitName_4,locator_designator_addressNumber,building,parcel

