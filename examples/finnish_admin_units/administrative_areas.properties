# General information about the api
api.title=Division into administrative areas (vector)
api.version=0.1
api.description=Division into administrative areas (vector) is a dataset depicting the municipalities, regions, Regional State Administrative Agencies, and the national border of Finland.
api.contact.name=Name of Contact
api.contact.email=hakunapi@io.github.nlsfi
api.contact.url=https://github.com/nlsfi/hakunapi
api.license.name=National Land Survey open data Attribution CC 4.0 licence, contains data from Division into administrative areas (vector)
api.license.url=https://www.maanmittauslaitos.fi/en/opendata-licence-cc40

# List of servers 
## Required, comma-separated list of server the API is
servers=dev
## The url of the server has to be correct as it is used for all links generated by the server
#servers.dev.url=http://${X-Forwarded-Host}/${X-Forwarded-Path}
servers.dev.url=http://localhost:8080/features
servers.dev.description=Development server

# API level configuration
formats=json,html,csv
formats.json.type=json
formats.html.type=html
formats.csv.type=csv
#formats.geojson.forceLonLat=true
getfeatures.limit.default=1000
getfeatures.limit.max=10000

srid=3067

db.classes=fi.nls.hakunapi.source.gpkg.GpkgSimpleSource

default.collections.type=gpkg
default.collections.srid=3067

# Collections and their configurations	
## Required, comma-separated list of all collections
collections=municipalities,municipalities_100k,municipalities_250k,municipalities_1000k,municipalities_4500k,regions,regions_100k,regions_4500k,regions_250k,regions_1000k,regional_state_administrative_agencies,regional_state_administrative_agencies_100k,regional_state_administrative_agencies_250k,regional_state_administrative_agencies_1000k,regional_state_administrative_agencies_4500k,wellbeing_services_counties,wellbeing_services_counties_100k,wellbeing_services_counties_250k,wellbeing_services_counties_1000k,wellbeing_services_counties_4500k,nations,nations_100k,nations_250k,nations_1000k,nations_4500k

# 1:10k

collections.municipalities.db=SuomenHallinnollisetKuntajakopohjaisetAluejaot_2025_10k.gpkg
collections.municipalities.table=Kunta
collections.municipalities.title=Municipalities 2025
collections.municipalities.parameters=gml_id,natcode,namefin,nameswe,landarea,freshwarea,seawarea,totalarea

collections.regions.db=SuomenHallinnollisetKuntajakopohjaisetAluejaot_2025_10k.gpkg
collections.regions.table=Maakunta
collections.regions.title=Regions 2025
collections.regions.parameters=gml_id,natcode,namefin,nameswe

collections.regional_state_administrative_agencies.db=SuomenHallinnollisetKuntajakopohjaisetAluejaot_2025_10k.gpkg
collections.regional_state_administrative_agencies.table=Aluehallintovirasto
collections.regional_state_administrative_agencies.title=Regional state administrative agencies 2025
collections.regional_state_administrative_agencies.parameters=gml_id,natcode,namefin,nameswe

collections.wellbeing_services_counties.db=SuomenHallinnollisetKuntajakopohjaisetAluejaot_2025_10k.gpkg
collections.wellbeing_services_counties.table=Hyvinvointialue
collections.wellbeing_services_counties.title=Wellbeing Services Counties 2025
